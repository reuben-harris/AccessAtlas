name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Configure pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend assets
        run: pnpm lint:frontend

      - name: Build frontend assets
        run: pnpm build:frontend

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: access_atlas
          POSTGRES_USER: access_atlas
          POSTGRES_PASSWORD: access_atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U access_atlas -d access_atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://access_atlas:access_atlas@localhost:5432/access_atlas
      SECRET_KEY: ci-secret-key
      DEBUG: "false"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Django check
        run: uv run python manage.py check

      - name: Test
        run: uv run pytest

  browser-smoke:
    name: Browser Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: access_atlas
          POSTGRES_USER: access_atlas
          POSTGRES_PASSWORD: access_atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U access_atlas -d access_atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      AUTH_MODE: local
      DATABASE_URL: postgres://access_atlas:access_atlas@localhost:5432/access_atlas
      SECRET_KEY: ci-secret-key
      DEBUG: "true"
      ALLOWED_HOSTS: localhost,127.0.0.1
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Configure pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm build:frontend

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply database migrations
        run: uv run python manage.py migrate --noinput

      - name: Run browser smoke tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
