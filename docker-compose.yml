services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: access_atlas
      POSTGRES_USER: access_atlas
      POSTGRES_PASSWORD: access_atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U access_atlas -d access_atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
