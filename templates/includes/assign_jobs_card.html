{% if form %}
  <div class="card mt-3">
    <div class="card-header"><h3 class="card-title">{{ title|default:"Assign Jobs" }}</h3></div>
    <div class="card-body">
      <form method="post" action="{{ action_url }}">
        {% csrf_token %}
        {% include "includes/form_fields.html" with form=form %}
        <button class="btn btn-primary" type="submit">
          <i class="ti ti-link" aria-hidden="true"></i>{{ submit_label|default:"Assign" }}
        </button>
      </form>
    </div>
  </div>
{% elif unavailable_message %}
  <div class="alert alert-info mt-3" role="status">
    {{ unavailable_message }}
  </div>
{% endif %}
