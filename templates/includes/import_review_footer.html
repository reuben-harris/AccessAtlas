<div class="d-flex flex-wrap align-items-center gap-2">
  {% if has_errors %}
    <div class="alert alert-warning mb-0 me-auto" role="alert">
      Upload a corrected CSV, or fix referenced app data and refresh the review before importing.
    </div>
    <button class="btn btn-orange" type="button" disabled>
      <i class="ti ti-upload" aria-hidden="true"></i>{{ confirm_button_label }}
    </button>
  {% else %}
    {% url confirm_url_name as confirm_url %}
    <form method="post" action="{{ confirm_url }}">
      {% csrf_token %}
      <button class="btn btn-orange" type="submit">
        <i class="ti ti-upload" aria-hidden="true"></i>{{ confirm_button_label }}
      </button>
    </form>
  {% endif %}

  {% if retained_csv_available %}
    <form method="post">
      {% csrf_token %}
      <button class="btn btn-outline-primary" type="submit" name="import_action" value="refresh">
        <i class="ti ti-refresh" aria-hidden="true"></i>Refresh review
      </button>
    </form>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <button class="btn btn-outline-secondary" type="submit" name="import_action" value="discard">
      <i class="ti ti-trash" aria-hidden="true"></i>Discard review
    </button>
  </form>
</div>
