{% extends "base/base.html" %}

{% block title %}Create Job From Template - Access Atlas{% endblock %}

{% block content %}
<h2 class="page-title">Create Job From Template</h2>
<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Create job</button>
    </form>
  </div>
</div>
{% endblock %}
