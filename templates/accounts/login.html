{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Atlas Login</title>
    <link rel="icon" type="image/png" href="{% static 'favicon-16.png' %}">
    <script>
      (function () {
        try {
          var theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-bs-theme", theme === "dark" ? "dark" : "light");
        } catch (error) {
          document.documentElement.setAttribute("data-bs-theme", "light");
        }
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.1/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <script src="{% static 'js/login_globe.js' %}" defer></script>
  </head>
  <body class="d-flex flex-column login-page">
    <canvas id="login-globe" class="login-globe" aria-hidden="true"></canvas>
    <div class="page page-center login-content">
      <div class="container container-tight py-4">
        <div class="card card-md login-card">
          <div class="card-body">
            <h1 class="h2 text-center mb-4">Access Atlas</h1>
            <p class="text-secondary">Proof-of-concept internal login. Enter your email to continue.</p>
            <form method="post">
              {% csrf_token %}
              {{ form.as_p }}
              <button class="btn btn-primary w-100" type="submit">Continue</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
