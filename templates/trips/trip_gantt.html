{% extends "base/base.html" %}
{% load static %}

{% block title %}Trip Gantt - Access Atlas{% endblock %}

{% block head %}
  <link rel="stylesheet" href="{% static 'vendor/frappe-gantt/frappe-gantt.css' %}">
{% endblock %}

{% block content %}
<div class="page-header d-print-none">
  <div class="row align-items-center">
    <div class="col">
      <h2 class="page-title">Trips</h2>
    </div>
    <div class="col-auto ms-auto">
      <a class="btn btn-primary" href="{% url 'trip_create' %}">New trip</a>
    </div>
  </div>
</div>

<div>
  {% include "trips/_trip_view_toolbar.html" %}

  <div class="card trip-gantt-card">
    <div class="card-header">
      <h3 class="card-title">Timeline</h3>
      <div class="card-actions">
        <div class="trip-gantt-view-modes" role="group" aria-label="Gantt timescale">
          <button class="trip-gantt-view-mode is-active" type="button" data-view-mode="Day">Day</button>
          <button class="trip-gantt-view-mode" type="button" data-view-mode="Week">Week</button>
        </div>
      </div>
    </div>
    <div class="card-body p-0">
      <div id="trip-gantt" class="trip-gantt" aria-label="Gantt view of scheduled site visits"></div>
    </div>
  </div>
</div>

{{ trip_gantt_rows|json_script:"trip-gantt-data" }}
<script src="{% static 'vendor/frappe-gantt/frappe-gantt.umd.js' %}"></script>
<script src="{% static 'js/trip_gantt.js' %}"></script>
{% endblock %}
